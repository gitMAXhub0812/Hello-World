<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      color: #e94560;
      letter-spacing: 2px;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      color: #a8dadc;
      min-height: 1.5rem;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      font-size: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x {
      color: #e94560;
    }

    .cell.o {
      color: #a8dadc;
    }

    .cell.win {
      background: #0f3460;
      border-color: #e94560;
      animation: pulse 0.4s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    #score {
      display: flex;
      gap: 2rem;
      margin-top: 1.5rem;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 0.5rem 1.2rem;
    }

    .score-box span {
      display: block;
      font-size: 1.6rem;
      font-weight: bold;
    }

    #btn-reset {
      margin-top: 1.5rem;
      padding: 0.6rem 2rem;
      font-size: 1rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #btn-reset:hover {
      background: #c73652;
    }
  </style>
</head>
<body>

  <h1>Tic Tac Toe</h1>
  <div id="status">Spieler X ist dran</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <div id="score">
    <div class="score-box">X <span id="score-x">0</span></div>
    <div class="score-box">Unentschieden <span id="score-draw">0</span></div>
    <div class="score-box">O <span id="score-o">0</span></div>
  </div>

  <button id="btn-reset">Neues Spiel</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, currentPlayer, gameOver;
    let scores = { X: 0, O: 0, draw: 0 };

    const cells   = document.querySelectorAll('.cell');
    const status  = document.getElementById('status');
    const btnReset = document.getElementById('btn-reset');

    function init() {
      board = Array(9).fill(null);
      currentPlayer = 'X';
      gameOver = false;
      cells.forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
      status.textContent = `Spieler X ist dran`;
    }

    function checkWinner() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { winner: board[a], line: [a, b, c] };
        }
      }
      if (board.every(v => v !== null)) return { winner: null, draw: true };
      return null;
    }

    function updateScore() {
      document.getElementById('score-x').textContent    = scores.X;
      document.getElementById('score-o').textContent    = scores.O;
      document.getElementById('score-draw').textContent = scores.draw;
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        const i = +cell.dataset.i;
        if (gameOver || board[i]) return;

        board[i] = currentPlayer;
        cell.textContent = currentPlayer;
        cell.classList.add(currentPlayer.toLowerCase(), 'taken');

        const result = checkWinner();
        if (result) {
          gameOver = true;
          if (result.winner) {
            result.line.forEach(idx => cells[idx].classList.add('win'));
            status.textContent = `Spieler ${result.winner} gewinnt! 🎉`;
            scores[result.winner]++;
          } else {
            status.textContent = 'Unentschieden!';
            scores.draw++;
          }
          updateScore();
        } else {
          currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
          status.textContent = `Spieler ${currentPlayer} ist dran`;
        }
      });
    });

    btnReset.addEventListener('click', init);

    init();
  </script>
</body>
</html>
